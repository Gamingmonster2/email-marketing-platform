name: Run AI Agents

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 */2 * *"

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Smart Delay
        run: |
          DELAY=$(shuf -i 30-300 -n 1)
          echo "Waiting $DELAY seconds..."
          sleep $DELAY

      - name: Run Publisher Agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: node agents/publisher.js

      - name: Run Updater Agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: node agents/updater.js

      - name: Commit and Push changes
        run: |
          if [ -f last_author.txt ]; then
            AUTHOR_NAME=$(cat last_author.txt)
          else
            AUTHOR_NAME="Saif Agent Bot"
          fi
          
          git config --global user.name "$AUTHOR_NAME"
          git config --global user.email "agent@email.com.ly"
          git add src/content/blog/
          
          if git diff --staged --quiet; then
            echo "No new articles today."
          else
            git commit -m "New AI Article by $AUTHOR_NAME"
            git push
          fi
