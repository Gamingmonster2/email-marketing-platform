name: Run AI Agents

on:
  schedule:
    # ينطلق الساعة 10 صباحاً بتوقيت ليبيا، يوم نعم ويوم لا (كل 48 ساعة)
    - cron: '0 8 */2 * *'
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Smart Economical Delay (تأخير اقتصادي: من 30 ثانية إلى 5 دقائق)
        run: |
          DELAY=$(shuf -i 30-300 -n 1)
          echo "جاري الانتظار لمدة $DELAY ثانية لمحاكاة النشر البشري..."
          sleep $DELAY

      - name: Run Publisher Agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: node agents/publisher.js

      - name: Run Updater Agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: node agents/updater.js

      - name: Commit and Push changes
        run: |
          if [ -f last_author.txt ]; then
            AUTHOR_NAME=$(cat last_author.txt)
          else
            AUTHOR_NAME="Saif Agent Bot"
          fi
          
          git config --global user.name "$AUTHOR_NAME"
          git config --global user.email "agent@email.com.ly"
          git add src/content/blog/
          
          if git diff --staged --quiet; then
            echo "لا توجد مقالات جديدة اليوم."
          else
            git commit -m "✍️ مقال جديد بقلم $AUTHOR_NAME"
            git push
          fi
